<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>KAVA - Expérience Café IA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C4RSBD0EZD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-C4RSBD0EZD');
</script>
  
<style>
:root {
  --main-color: #0A2540;
  --accent-color: #00C2FF;
  --bg-gradient: linear-gradient(135deg, #f4f6f9 0%, #e2e8f0 100%);
}

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, Arial, sans-serif;
  background: var(--bg-gradient);
  color: var(--main-color);
  scroll-behavior: smooth;
}

/* LANGUAGE SWITCH */
.lang-switch {
  position: fixed;
  top: 25px;
  right: 25px;
  z-index: 1000;
}
.lang-switch button {
  padding: 10px 18px;
  margin-left: 8px;
  border: 1px solid rgba(10, 37, 64, 0.1);
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  cursor: pointer;
  border-radius: 25px;
  font-weight: 600;
  transition: 0.3s;
}

/* --- HEADER SECTION --- */
.hero-header {
  position: relative;
  height: 100vh; 
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  background: #000;
  overflow: hidden;
}
.bg-video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: translate(-50%, -50%);
  filter: brightness(0.45); 
}
.overlay { position: relative; z-index: 1; text-align: center; padding: 20px; }
.logo-animate { 
  width: 320px;
  max-width: 90%; 
  border-radius: 25px; 
  margin-bottom: 20px;
}
.headline { font-size: 2.2rem; font-weight: 800; margin: 10px 0; }
.subtitle { font-size: 1.2rem; opacity: 0.9; margin-bottom: 25px; }

/* SCROLL SYMBOL */
.scroll-down {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  cursor: pointer;
  z-index: 2;
  text-align: center;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}
.mouse {
  width: 26px;
  height: 42px;
  border: 2px solid white;
  border-radius: 20px;
  display: block;
  margin: 0 auto 8px;
  position: relative;
}
.wheel {
  width: 4px;
  height: 8px;
  background: var(--accent-color);
  border-radius: 2px;
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  animation: scroll-anim 1.6s infinite;
}
@keyframes scroll-anim {
  0% { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(15px); }
}
#scroll-text { font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

/* --- CARDS & INTERACTIVE --- */
.container { max-width: 1200px; margin: auto; padding: 40px 20px; }
.card {
  background: white;
  padding: 30px;
  margin-bottom: 40px;
  border-radius: 30px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.05);
  text-align: center;
}

#action-video {
  width: 100%;
  max-width: 800px; 
  height: auto;
  border-radius: 20px;
  display: block;
  margin: 20px auto;
}

.image-wrapper { position: relative; display: inline-block; width: 100%; max-width: 900px; }
.main-image { width: 100%; border-radius: 25px; display: block; }

.point { position: absolute; width: 20px; height: 20px; background: var(--accent-color); border-radius: 50%; cursor: pointer; z-index: 10; }
.point.active { background: white; border: 5px solid var(--accent-color); transform: scale(1.3); }

/* HOVER TITLE TOOLTIP */
.point::after {
  content: attr(data-title);
  position: absolute;
  bottom: 150%;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--main-color);
  color: white;
  padding: 6px 14px;
  border-radius: 10px;
  font-size: 0.9rem;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
  pointer-events: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
.point:hover::after { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

/* --- FEATURE BOX --- */
.feature-box {
  margin-top: 30px;
  padding: 20px;
  border-radius: 25px;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  opacity: 0;
  transition: 0.5s ease;
  border: 1px solid #edf2f7;
}
.feature-box.show { opacity: 1; }
.feature-img-wrapper { width: 100%; max-width: 250px; }
.feature-box img { width: 100%; border-radius: 15px; }
.feature-text-wrapper { text-align: center; }

/* --- CONTACT FORM --- */
.contact-flex { display: flex; flex-direction: column; align-items: center; gap: 30px; }
.contact-video-side { width: 70%; mix-blend-mode: multiply; }
.contact-form-side { width: 100%; text-align: center; }

.contact-form-side input, .contact-form-side textarea { 
  width: 100%; margin: 10px 0; padding: 18px; border-radius: 15px; 
  border: 1.5px solid #edf2f7; background: #f8fafc; font-family: inherit; box-sizing: border-box; 
}
.contact-form-side button { 
  width: 100%; padding: 18px; background: var(--main-color); color: white; 
  border: none; border-radius: 45px; cursor: pointer; font-weight: 700; transition: 0.3s; 
}
.contact-form-side button:hover { background: var(--accent-color); transform: translateY(-3px); }

/* --- DESKTOP STYLES --- */
@media (min-width: 992px) {
  .hero-header { height: 100vh; }
  .logo-animate { width: 580px; }
  .headline { font-size: 3.8rem; }
  .subtitle { font-size: 1.8rem; }
  .feature-box { flex-direction: row; height: 350px; padding: 0; overflow: hidden; }
  .feature-img-wrapper { width: 50%; max-width: none; }
  .feature-text-wrapper { width: 50%; padding: 50px; text-align: left; background: #fff; }
  .contact-flex { flex-direction: row; text-align: left; }
  .contact-video-side { width: 40%; }
}
</style>
</head>
<body>

<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
</div>

<header class="hero-header">
  <video id="hero-bg-video" autoplay muted playsinline class="bg-video">
    <source src="images/arm AI video.mp4" type="video/mp4">
  </video>
  <div class="overlay">
    <img src="images/KAVA LOGO.png" class="logo-animate" alt="KAVA Logo">
    <h1 id="title" class="headline"></h1>
    <p id="subtitle" class="subtitle"></p>
  </div>

  <a href="#first-section" class="scroll-down">
    <span class="mouse"><span class="wheel"></span></span>
    <span id="scroll-text"></span>
  </a>
</header>

<div class="container" id="first-section">
  <div class="card">
    <h2 id="video-title"></h2>
    <video controls id="action-video">
      <source id="video-source" src="images/Storyboard.mp4" type="video/mp4">
    </video>
  </div>

  <div class="card">
    <h2 id="experience-title"></h2>
    <div class="image-wrapper">
      <img src="images/KAVA Home page.png" class="main-image" alt="KAVA Machine">
      <div class="point" data-feature="screen" style="top:27%; left:49%;" onclick="showFeature('screen')"></div>
      <div class="point" data-feature="robot" style="top:50%; left:49%;" onclick="showFeature('robot')"></div>
      <div class="point" data-feature="touch" style="top:69%; left:49%;" onclick="showFeature('touch')"></div>
      <div class="point" data-feature="foam" style="top:66%; left:22%;" onclick="showFeature('foam')"></div>
    </div>
    
    <div class="feature-box" id="feature-box">
        <div class="feature-img-wrapper"><img id="feature-image" src="" alt=""></div>
        <div class="feature-text-wrapper">
          <h3 id="feature-title"></h3>
          <p id="feature-text"></p>
        </div>
    </div>
  </div>

  <div class="card" id="contact">
    <div class="contact-flex">
      <video autoplay muted playsinline loop class="contact-video-side">
        <source src="images/contact-video.mp4" type="video/mp4">
      </video>
      <div class="contact-form-side" id="form-container">
        <h2 id="contact-title"></h2>
        
        <form action="https://formspree.io/f/xvzwjpad" method="POST" id="kava-form">
          <input type="text" name="name" id="input-name" required>
          <input type="email" name="email" id="input-email" required>
          <textarea name="message" id="input-message" rows="4" required></textarea>
          <button type="submit" id="contact-btn"></button>
        </form>
        
      </div>
    </div>
  </div>
</div>

<script>
let currentLang = "fr";

const featuresData = {
  screen: {
    en: { title: "Menu Display", text: "View our full selection of hot and cold beverages and current pricing.", image: "images/screen.png" },
    fr: { title: "Écran d'affichage", text: "Consultez notre menu complet et les tarifs en un coup d'œil.", image: "images/screen.png" }
  },
  robot: {
    en: { title: "Robotic Arm", text: "Watch our high-precision robotic barista craft your drink with perfect consistency.", image: "images/robot.png" },
    fr: { title: "Bras robotisé", text: "Admirez la précision de notre barista technologique.", image: "images/robot.png" }
  },
  touch: {
    en: { title: "Touch Screen", text: "Select your favorite drink and customize it in just a few taps.", image: "images/touch.png" },
    fr: { title: "Écran tactile", text: "Commandez et personnalisez votre boisson en quelques clics.", image: "images/touch.png" }
  },
  foam: {
    en: { title: "Foam Art", text: "Our advanced tech prints high-definition edible ink portraits directly onto your latte.", image: "images/foam.png" },
    fr: { title: "Art mousse", text: "Notre technologie imprime des portraits haute définition directement sur votre mousse.", image: "images/foam.png" }
  }
};

function setLang(lang) {
  currentLang = lang;
  const content = {
    en: { title: "The Future of Coffee", sub: "AI-Powered Robotic Barista", vTitle: "See It in Action", eTitle: "KAVA Technology", cTitle: "Contact Us", btn: "Send Message", name: "Name", email: "Email", msg: "Message", scroll: "Scroll" },
    fr: { title: "Le Futur du Café", sub: "Barista Robotisé par l'IA", vTitle: "Voir en Action", eTitle: "Technologie KAVA", cTitle: "Nous Contacter", btn: "Envoyer", name: "Nom", email: "Email", msg: "Message", scroll: "Découvrir" }
  };
  
  const tooltips = {
    en: { screen: "Menu Display", robot: "Robotic Arm", touch: "Touchscreen", foam: "Foam Art" },
    fr: { screen: "Écran d'affichage", robot: "Bras robotisé", touch: "Écran Tactile", foam: "Art Mousse" }
  };

  const d = content[lang];
  document.getElementById("title").innerText = d.title;
  document.getElementById("subtitle").innerText = d.sub;
  document.getElementById("video-title").innerText = d.vTitle;
  document.getElementById("experience-title").innerText = d.eTitle;
  document.getElementById("contact-title").innerText = d.cTitle;
  document.getElementById("contact-btn").innerText = d.btn;
  document.getElementById("input-name").placeholder = d.name;
  document.getElementById("input-email").placeholder = d.email;
  document.getElementById("input-message").placeholder = d.msg;
  document.getElementById("scroll-text").innerText = d.scroll;

  document.querySelectorAll('.point').forEach(p => {
    const feature = p.getAttribute('data-feature');
    p.setAttribute('data-title', tooltips[lang][feature]);
  });

  const videoPlayer = document.getElementById("action-video");
  videoPlayer.src = lang === 'fr' ? 'images/Storyboard.mp4' : 'images/Storyboard.mp4';
  videoPlayer.load();

  // Reset and play Hero Video
  const heroVideo = document.getElementById("hero-bg-video");
  heroVideo.currentTime = 0;
  heroVideo.play();
}

// FORMSPREE SUBMISSION WITHOUT PAGE RELOAD
const contactForm = document.getElementById('kava-form');
contactForm.addEventListener("submit", function(e) {
  e.preventDefault();
  const data = new FormData(contactForm);
  fetch(contactForm.action, {
    method: contactForm.method,
    body: data,
    headers: { 'Accept': 'application/json' }
  }).then(response => {
    if (response.ok) {
      document.getElementById("form-container").innerHTML = 
        `<h2 style="color:var(--accent-color); font-size:3rem;">✓</h2>
         <p style="font-weight:bold;">${currentLang === 'fr' ? 'Merci !' : 'Thank You!'}</p>
         <p>${currentLang === 'fr' ? 'Votre message a été envoyé.' : 'Your message has been sent.'}</p>`;
    } else {
      alert("Error.");
    }
  });
});

function showFeature(featureKey) {
  const data = featuresData[featureKey][currentLang];
  const box = document.getElementById("feature-box");
  document.getElementById("feature-image").src = data.image;
  document.getElementById("feature-title").innerText = data.title;
  document.getElementById("feature-text").innerText = data.text;
  box.classList.add("show");
  document.querySelectorAll(".point").forEach(p => p.classList.toggle("active", p.getAttribute('data-feature') === featureKey));
}

window.onload = () => { setLang("fr"); showFeature("screen"); };
</script>

</body>
</html>
