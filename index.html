<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>KAVA - Expérience Café IA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --main-color: #0A2540;
  --accent-color: #00C2FF;
  --bg-gradient: linear-gradient(135deg, #f4f6f9 0%, #e2e8f0 100%);
}

/* GLOBAL */
body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, Arial, sans-serif;
  background: var(--bg-gradient);
  color: var(--main-color);
  scroll-behavior: smooth;
}

/* LANGUAGE SWITCH */
.lang-switch {
  position: fixed;
  top: 25px;
  right: 25px;
  z-index: 1000;
}
.lang-switch button {
  padding: 10px 18px;
  margin-left: 8px;
  border: 1px solid rgba(10, 37, 64, 0.1);
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  cursor: pointer;
  border-radius: 25px;
  font-weight: 600;
  transition: 0.3s;
}

/* --- HEADER SECTION --- */
.hero-header {
  position: relative;
  height: 70vh; /* Default Mobile Height */
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  background: #000;
  overflow: hidden;
}
.bg-video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: translate(-50%, -50%);
  filter: brightness(0.45); 
}
.overlay { position: relative; z-index: 1; text-align: center; padding: 20px; }
.logo-animate { 
  width: 320px; /* Default Mobile Logo */
  max-width: 90%; 
  border-radius: 25px; 
  margin-bottom: 20px;
}
.headline { font-size: 2.2rem; font-weight: 800; margin: 10px 0; }
.subtitle { font-size: 1.2rem; opacity: 0.9; margin-bottom: 25px; }

/* --- CARDS & INTERACTIVE --- */
.container { max-width: 1200px; margin: auto; padding: 40px 20px; }
.card {
  background: white;
  padding: 30px;
  margin-bottom: 40px;
  border-radius: 30px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.05);
  text-align: center;
}

/* FIXED VIDEO SIZE */
#action-video {
  width: 100%;
  max-width: 800px; /* Limits the size on screen */
  height: auto;
  border-radius: 20px;
  display: block;
  margin: 20px auto;
}

.image-wrapper { position: relative; display: inline-block; width: 100%; max-width: 900px; }
.main-image { width: 100%; border-radius: 25px; display: block; }

/* INTERACTIVE POINTS & TOOLTIPS */
.point { position: absolute; width: 20px; height: 20px; background: var(--accent-color); border-radius: 50%; cursor: pointer; z-index: 10; }
.point.active { background: white; border: 5px solid var(--accent-color); transform: scale(1.3); }

.point::after {
  content: attr(data-title);
  position: absolute;
  bottom: 150%;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--main-color);
  color: white;
  padding: 6px 14px;
  border-radius: 10px;
  font-size: 0.9rem;
  white-space: nowrap;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
  pointer-events: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.point:hover::after {
  opacity: 1;
  visibility: visible;
  transform: translateX(-50%) translateY(0);
}

/* --- FEATURE BOX (Mobile Style by Default) --- */
.feature-box {
  margin-top: 30px;
  padding: 20px;
  border-radius: 25px;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  opacity: 0;
  transition: 0.5s ease;
  border: 1px solid #edf2f7;
}
.feature-box.show { opacity: 1; }
.feature-img-wrapper { width: 100%; max-width: 250px; }
.feature-box img { width: 100%; border-radius: 15px; }
.feature-text-wrapper { text-align: center; }

/* --- CONTACT --- */
.contact-flex { display: flex; flex-direction: column; align-items: center; gap: 30px; }
.contact-video-side { width: 70%; mix-blend-mode: multiply; }
.contact-form-side { width: 100%; text-align: center; }

/* ============================================================
   DESKTOP STYLES (Screen wider than 992px)
   ============================================================ */
@media (min-width: 992px) {
  .hero-header { height: 90vh; }
  .bg-video { transform: translate(-50%, -50%) scale(1.1); }
  .logo-animate { width: 580px; border-radius: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
  .headline { font-size: 3.8rem; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
  .subtitle { font-size: 1.8rem; }

  .card { padding: 60px 50px; border-radius: 40px; }
  
  .feature-box {
    flex-direction: row;
    align-items: stretch;
    padding: 0;
    overflow: hidden;
    height: 350px;
  }
  .feature-img-wrapper { width: 50%; max-width: none; }
  .feature-box img { height: 100%; object-fit: cover; border-radius: 0; }
  .feature-text-wrapper { width: 50%; padding: 50px; text-align: left; background: #fff; }
  
  .contact-flex { flex-direction: row; text-align: left; }
  .contact-video-side { width: 40%; }
  .contact-form-side { text-align: left; }
}

/* Shared UI Components */
.contact-form-side input, .contact-form-side textarea { width: 100%; margin: 10px 0; padding: 18px; border-radius: 15px; border: 1.5px solid #edf2f7; background: #f8fafc; font-family: inherit; }
.contact-form-side button { width: 100%; padding: 18px; background: var(--main-color); color: white; border: none; border-radius: 45px; cursor: pointer; font-weight: 700; transition: 0.3s; }
.contact-form-side button:hover { background: var(--accent-color); transform: translateY(-3px); }
</style>
</head>
<body>

<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
</div>

<header class="hero-header">
  <video id="hero-bg-video" autoplay muted playsinline loop class="bg-video">
    <source src="images/arm AI video.mp4" type="video/mp4">
  </video>
  <div class="overlay">
    <img src="images/KAVA LOGO.png" class="logo-animate" alt="KAVA Logo">
    <h1 id="title" class="headline"></h1>
    <p id="subtitle" class="subtitle"></p>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2 id="video-title"></h2>
    <video controls id="action-video">
      <source id="video-source" src="images/Storyboard.mp4" type="video/mp4">
    </video>
  </div>

  <div class="card">
    <h2 id="experience-title"></h2>
    <div class="image-wrapper">
      <img src="images/KAVA Home page.png" class="main-image" alt="KAVA Machine">
      <div class="point" data-feature="screen" style="top:27%; left:49%;" onclick="showFeature('screen')"></div>
      <div class="point" data-feature="robot" style="top:50%; left:49%;" onclick="showFeature('robot')"></div>
      <div class="point" data-feature="touch" style="top:69%; left:49%;" onclick="showFeature('touch')"></div>
      <div class="point" data-feature="foam" style="top:66%; left:22%;" onclick="showFeature('foam')"></div>
    </div>
    
    <div class="feature-box" id="feature-box">
        <div class="feature-img-wrapper"><img id="feature-image" src="" alt=""></div>
        <div class="feature-text-wrapper">
          <h3 id="feature-title"></h3>
          <p id="feature-text"></p>
        </div>
    </div>
  </div>

  <div class="card" id="contact">
    <div class="contact-flex">
      <video autoplay muted playsinline loop class="contact-video-side">
        <source src="images/contact-video.mp4" type="video/mp4">
      </video>
      <div class="contact-form-side" id="form-container">
        <h2 id="contact-title"></h2>
        <input type="text" id="input-name" placeholder="">
        <input type="email" id="input-email" placeholder="">
        <textarea id="input-message" rows="4" placeholder=""></textarea>
        <button type="button" id="contact-btn" onclick="handleSend()"></button>
      </div>
    </div>
  </div>
</div>

<script>
let currentLang = "fr";

const featuresData = {
  screen: {
    en: { title: "Menu Display", text: "View our full selection of hot and cold beverages and current pricing. This screen showcases our latest digital latte art creations.", image: "images/screen.png" },
    fr: { title: "Écran d'affichage", text: "Consultez notre menu complet et les tarifs en un coup d'œil. Cet écran affiche nos dernières créations de latte art.", image: "images/screen.png" }
  },
  robot: {
    en: { title: "Robotic Arm", text: "Watch our high-precision robotic barista craft your drink with perfect consistency and zero human contact.", image: "images/robot.png" },
    fr: { title: "Bras robotisé", text: "Admirez la précision de notre barista technologique. Il prépare votre café avec une régularité parfaite.", image: "images/robot.png" }
  },
  touch: {
    en: { title: "Touch Screen", text: "Select your favorite drink and customize it in just a few taps. Upload your photo to be printed on the foam.", image: "images/touch.png" },
    fr: { title: "Écran tactile", text: "Commandez et personnalisez votre boisson en quelques clics. Téléchargez votre photo pour l'imprimer sur la mousse.", image: "images/touch.png" }
  },
  foam: {
    en: { title: "Foam Art", text: "Our advanced tech prints high-definition edible ink portraits directly onto your latte foam in seconds.", image: "images/foam.png" },
    fr: { title: "Art mousse", text: "Notre technologie imprime des portraits haute définition avec de l'encre comestible directement sur votre mousse.", image: "images/foam.png" }
  }
};

function setLang(lang) {
  currentLang = lang;
  const content = {
    en: { title: "The Future of Coffee", sub: "AI-Powered Robotic Barista", vTitle: "See It in Action", eTitle: "KAVA Technology", cTitle: "Contact Us", btn: "Send Message", name: "Name", email: "Email", msg: "Message" },
    fr: { title: "Le Futur du Café", sub: "Barista Robotisé par l'IA", vTitle: "Voir en Action", eTitle: "Technologie KAVA", cTitle: "Nous Contacter", btn: "Envoyer", name: "Nom", email: "Email", msg: "Message" }
  };
  
  const tooltips = {
    en: { screen: "Menu Display", robot: "Robotic Arm", touch: "Touch Interface", foam: "Foam Printing" },
    fr: { screen: "Écran Menu", robot: "Barista Robot", touch: "Interface Tactile", foam: "Impression Mousse" }
  };

  const d = content[lang];
  document.getElementById("title").innerText = d.title;
  document.getElementById("subtitle").innerText = d.sub;
  document.getElementById("video-title").innerText = d.vTitle;
  document.getElementById("experience-title").innerText = d.eTitle;
  document.getElementById("contact-title").innerText = d.cTitle;
  document.getElementById("contact-btn").innerText = d.btn;
  document.getElementById("input-name").placeholder = d.name;
  document.getElementById("input-email").placeholder = d.email;
  document.getElementById("input-message").placeholder = d.msg;

  // Update hover titles
  document.querySelectorAll('.point').forEach(p => {
    const feature = p.getAttribute('data-feature');
    p.setAttribute('data-title', tooltips[lang][feature]);
  });

  // Switch Storyboard video based on language
  const videoPlayer = document.getElementById("action-video");
  const videoSrc = lang === 'fr' ? 'images/StoryboardFR.mp4' : 'images/Storyboard.mp4';
  if(videoPlayer.src.indexOf(videoSrc) === -1) {
    videoPlayer.src = videoSrc;
    videoPlayer.load();
  }
}

function showFeature(featureKey) {
  const data = featuresData[featureKey][currentLang];
  const box = document.getElementById("feature-box");
  document.getElementById("feature-image").src = data.image;
  document.getElementById("feature-title").innerText = data.title;
  document.getElementById("feature-text").innerText = data.text;
  box.classList.add("show");
  document.querySelectorAll(".point").forEach(p => p.classList.toggle("active", p.getAttribute('data-feature') === featureKey));
}

function handleSend() {
  document.getElementById("form-container").innerHTML = `<h2 style="color:var(--accent-color)">✓</h2><p>${currentLang === 'fr' ? 'Merci !' : 'Thank You!'}</p>`;
}

window.onload = () => { setLang("fr"); showFeature("screen"); };
</script>

</body>
</html>
