<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAVA - AI Coffee Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --main-color: #0A2540;
  --accent-color: #00C2FF;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  scroll-behavior: smooth;
}

/* LANGUAGE SWITCH */
.lang-switch {
  position: fixed;
  top: 15px;
  right: 20px;
  z-index: 1000;
}
.lang-switch button {
  padding: 8px 12px;
  margin-left: 5px;
  border: none;
  background: white;
  cursor: pointer;
  border-radius: 6px;
}

/* HERO */
.hero-header {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}
.bg-video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: translate(-50%, -50%);
  filter: brightness(0.65);
}
.overlay { position: relative; z-index: 1; text-align: center; }
.logo-animate { width: 600px; max-width: 80%; border-radius: 20px; }
.headline { font-size: 3rem; }
.subtitle { font-size: 1.4rem; }

/* CONTAINER */
.container {max-width:1100px;margin:auto;padding:50px 20px;}

/* CARD */
.card {
  background:white;
  padding:30px;
  margin:30px 0;
  border-radius:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* FEATURE BOX */
.feature-box {
  margin-top:20px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  opacity:0;
  transform:translateY(30px);
  transition:all 0.5s ease;
}
.feature-box.show {opacity:1;transform:translateY(0);}
.feature-flex {display:flex;gap:20px;justify-content:center;align-items:center;}
.feature-box img {width:250px;border-radius:15px;}
.feature-text-wrapper {max-width:220px;}

/* CONTACT SECTION */
.contact-box {
  background:var(--main-color);
  color:white;
  padding:40px;
}

/* FLEX LAYOUT */
.contact-flex {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:40px;
  flex-wrap:wrap;
}

.contact-content {
  flex:1;
  min-width:280px;
}

/* FORM */
.contact-box input,
.contact-box textarea {
  width:100%;
  max-width:500px;
  display:block;
  margin:10px 0;
  padding:12px;
  border-radius:8px;
  border:none;
}

.contact-box button {
  padding:12px 25px;
  background:var(--accent-color);
  border:none;
  color:white;
  border-radius:20px;
  cursor:pointer;
}

/* VIDEO SIDE */
.contact-video {
  flex:1;
  min-width:250px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* GLOW */
.contact-video::before {
  content:"";
  position:absolute;
  width:120%;
  height:120%;
  top:-10%;
  left:-10%;
  background:radial-gradient(circle, rgba(0,194,255,0.2), transparent 70%);
  filter:blur(40px);
}

/* VIDEO STYLE */
.contact-video video {
  width:100%;
  max-width:320px;
  border-radius:20px;
  position:relative;
  z-index:1;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  transform:scale(0.95);
  transition:all 0.4s ease;
}

.contact-video video:hover {
  transform:scale(1);
  box-shadow:0 20px 50px rgba(0,194,255,0.3);
}

/* MOBILE */
@media (max-width:768px){
  .contact-flex {flex-direction:column;text-align:center;}
}
</style>
</head>

<body>

<!-- LANGUAGE -->
<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
</div>

<header class="hero-header">
  <video autoplay muted loop class="bg-video">
    <source src="images/arm AI video.mp4" type="video/mp4">
  </video>
  <div class="overlay">
    <img src="images/KAVA LOGO.png" class="logo-animate">
    <h1 id="title"></h1>
    <p id="subtitle"></p>
  </div>
</header>

<div class="container">

<!-- CONTACT -->
<div class="card contact-box">
  <div class="contact-flex">

    <!-- FORM -->
    <div class="contact-content">
      <h2 id="contact-title"></h2>
      <form>
        <input type="text" name="name">
        <input type="email" name="email">
        <textarea name="message"></textarea>
        <button id="contact-btn"></button>
      </form>
    </div>

    <!-- ROBOTIC VIDEO -->
    <div class="contact-video">
      <video id="contact-video-player" autoplay muted loop playsinline>
        <source src="images/contact-video.mp4" type="video/mp4">
      </video>
    </div>

  </div>
</div>

</div>

<script>
function setLang(lang){
  if(lang==="fr"){
    document.getElementById("title").innerText="Découvrez le futur du café";
    document.getElementById("subtitle").innerText="Barista robotisé IA";
    document.getElementById("contact-title").innerText="Travaillons ensemble";
    document.getElementById("contact-btn").innerText="Envoyer";
  } else {
    document.getElementById("title").innerText="Meet the Future of Coffee";
    document.getElementById("subtitle").innerText="AI-powered robotic barista";
    document.getElementById("contact-title").innerText="Let’s Work Together";
    document.getElementById("contact-btn").innerText="Send";
  }
}

/* PERFECT LOOP */
const contactVideo = document.getElementById("contact-video-player");
contactVideo.muted = true;

contactVideo.addEventListener("ended", () => {
  contactVideo.currentTime = 0.2;
  contactVideo.play();
});

window.onload = () => setLang("en");
</script>

</body>
</html>
