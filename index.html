<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAVA - AI Coffee Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --main-color: #0A2540;
  --accent-color: #00C2FF;
}

/* GLOBAL */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  scroll-behavior: smooth;
}

/* LANGUAGE SWITCH */
.lang-switch {
  position: fixed;
  top: 15px;
  right: 20px;
  z-index: 1000;
}
.lang-switch button {
  padding: 8px 12px;
  margin-left: 5px;
  border: none;
  background: white;
  cursor: pointer;
  border-radius: 6px;
}

/* HERO HEADER */
.hero-header {
  position: relative;
  height: 110vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}
.bg-video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: translate(-50%, -50%);
  z-index: 0;
  filter: brightness(0.65);
}
.overlay {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 20px;
}
.logo-animate {
  width: 500px;
  max-width: 90%;
  border-radius: 50%;
  margin-bottom: 20px;
}
.headline {
  font-size: 4rem;
  margin: 10px 0;
}
.subtitle {
  font-size: 1.8rem;
  margin-bottom: 20px;
}
.cta-btn {
  padding: 14px 35px;
  background: white;
  color: var(--main-color);
  border-radius: 25px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}
.cta-btn:hover {
  background: var(--accent-color);
  color: white;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 50px 20px;
}

/* CARD */
.card {
  background: white;
  padding: 30px;
  margin: 30px 0;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* VIDEO */
.card video {
  width: 90%;
  max-width: 600px;
  display: block;
  margin: 20px auto;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* INTERACTIVE IMAGE */
.image-wrapper {
  position: relative;
}
.main-image {
  width: 80%;
  max-width: 500px;
  display: block;
  margin: 0 auto;
  border-radius: 20px;
}

/* COMPONENT IMAGES */
.component-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: none;
  pointer-events: none;
  border-radius: 20px;
  z-index: 1;
}

/* POINTS */
.point {
  position: absolute;
  width: 20px;
  height: 20px;
  background: var(--accent-color);
  border-radius: 50%;
  cursor: pointer;
  animation: pulse 2s infinite;
  z-index: 2;
}
.point:hover { transform: scale(1.5); }

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(0,194,255,0.7); }
  70% { box-shadow: 0 0 0 15px rgba(0,194,255,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,194,255,0); }
}

/* TOOLTIP BOX */
.feature-tooltip {
  position: absolute;
  background: var(--accent-color);
  color: white;
  padding: 12px 18px;
  border-radius: 12px;
  max-width: 180px;
  text-align: center;
  font-size: 0.9rem;
  display: none;
  z-index: 10;
  pointer-events: none;
}
.feature-tooltip::after {
  content: '';
  position: absolute;
  width: 0; 
  height: 0; 
  border-style: solid;
  border-width: 8px 8px 0 8px;
  border-color: var(--accent-color) transparent transparent transparent;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
}

/* FEATURE BOX */
.feature-box {
  margin-top: 30px;
  padding: 25px;
  background: #f1f5f9;
  border-radius: 15px;
  text-align: center;
  min-height: 120px;
}

/* CONTACT */
.contact-box {
  background: var(--main-color);
  color: white;
  text-align: center;
  padding: 40px 20px;
}
.contact-box input,
.contact-box textarea {
  width: 100%;
  max-width: 500px;
  display: block;
  margin: 10px auto;
  padding: 12px;
  border-radius: 8px;
  border: none;
}
.contact-box button {
  padding: 12px 25px;
  background: var(--accent-color);
  border: none;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}
.contact-box button:hover {
  background: white;
  color: var(--main-color);
}
</style>
</head>
<body>

<!-- LANGUAGE SWITCH -->
<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
</div>

<!-- HERO -->
<header class="hero-header">
  <video autoplay muted playsinline class="bg-video">
    <source src="images/arm AI video.mp4" type="video/mp4">
  </video>
  <div class="overlay">
    <img src="images/KAVA LOGO.png" class="logo-animate">
    <h1 id="title" class="headline"></h1>
    <p id="subtitle" class="subtitle"></p>
    <a href="#contact" id="cta" class="cta-btn"></a>
  </div>
</header>

<div class="container">

  <!-- VIDEO -->
  <div class="card">
    <h2 id="video-title"></h2>
    <video controls id="action-video">
      <source src="images/Storyboard.mp4" type="video/mp4">
    </video>
  </div>

  <!-- INTERACTIVE MACHINE -->
  <div class="card">
    <h2 id="experience-title"></h2>
    <div class="image-wrapper">
      <img src="images/KAVA Home page.png" class="main-image">

      <!-- Component images -->
      <img src="images/screen.png" class="component-img" id="img-screen">
      <img src="images/robot.png" class="component-img" id="img-robot">
      <img src="images/touch.png" class="component-img" id="img-touch">
      <img src="images/foam.png" class="component-img" id="img-foam">

      <!-- POINTS -->
      <div class="point" style="top:30%; left:50%;" onclick="showFeature('screen', this)"></div>
      <div class="point" style="top:52%; left:48%;" onclick="showFeature('robot', this)"></div>
      <div class="point" style="top:70%; left:50%;" onclick="showFeature('touch', this)"></div>
      <div class="point" style="top:55%; left:30%;" onclick="showFeature('foam', this)"></div>

      <!-- TOOLTIP -->
      <div class="feature-tooltip" id="tooltip"></div>
    </div>

    <div class="feature-box">
      <h3 id="feature-title"></h3>
      <p id="feature-text"></p>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="card contact-box" id="contact">
    <h2 id="contact-title"></h2>
    <form>
      <input type="text" name="name" placeholder="">
      <input type="email" name="email" placeholder="">
      <textarea name="message" placeholder=""></textarea>
      <button id="contact-btn"></button>
    </form>
  </div>

</div>

<script>
let currentLang = "en";

// FEATURES DATA
const featuresData = {
  screen: { titleEN: "Touch Screen", textEN: "Intuitive and responsive interface.",
            titleFR: "Écran tactile", textFR: "Interface intuitive et réactive." },
  robot: { titleEN: "Robot Arm", textEN: "Precision robotic barista delivering perfect coffee.",
           titleFR: "Bras robotisé", textFR: "Barista robotique précis livrant un café parfait." },
  touch: { titleEN: "Touch Control", textEN: "Customizable coffee options at your fingertips.",
           titleFR: "Contrôle tactile", textFR: "Options de café personnalisables à portée de main." },
  foam: { titleEN: "Foam Art", textEN: "Beautiful latte art every time.",
          titleFR: "Art de mousse", textFR: "Art latte magnifique à chaque fois." }
};

// LANGUAGE SWITCH
function setLang(lang) {
  currentLang = lang;
  if(lang === "fr"){
    document.getElementById("title").innerText = "Découvrez le futur du café";
    document.getElementById("subtitle").innerText = "Barista robotisé alimenté par l’IA";
    document.getElementById("cta").innerText = "Demander un partenariat";
    document.getElementById("video-title").innerText = "Voir en action";
    document.getElementById("experience-title").innerText = "Technologie KAVA";
    document.getElementById("contact-title").innerText = "Travaillons ensemble";
    document.getElementById("contact-btn").innerText = "Envoyer";
    document.querySelector('input[name="name"]').placeholder = "Votre nom";
    document.querySelector('input[name="email"]').placeholder = "Votre email";
    document.querySelector('textarea[name="message"]').placeholder = "Votre message";
    document.querySelector("#action-video source").src = "images/StoryboardFR.mp4";
  } else {
    document.getElementById("title").innerText = "Meet the Future of Coffee";
    document.getElementById("subtitle").innerText = "AI-powered robotic barista";
    document.getElementById("cta").innerText = "Request Partnership";
    document.getElementById("video-title").innerText = "See It in Action";
    document.getElementById("experience-title").innerText = "KAVA Technology";
    document.getElementById("contact-title").innerText = "Let’s Work Together";
    document.getElementById("contact-btn").innerText = "Send";
    document.querySelector('input[name="name"]').placeholder = "Your Name";
    document.querySelector('input[name="email"]').placeholder = "Your Email";
    document.querySelector('textarea[name="message"]').placeholder = "Your Message";
    document.querySelector("#action-video source").src = "images/Storyboard.mp4";
  }
  document.getElementById("action-video").load();
}

// SHOW FEATURE WITH TOOLTIP AND COMPONENT IMAGE
function showFeature(feature, el){
  const tooltip = document.getElementById("tooltip");
  const rect = el.getBoundingClientRect();
  const wrapperRect = el.parentElement.getBoundingClientRect();

  tooltip.style.left = (rect.left - wrapperRect.left + rect.width/2) + "px";
  tooltip.style.top = (rect.top - wrapperRect.top - 45) + "px";
  tooltip.style.display = "block";

  if(currentLang === "fr"){
    document.getElementById("feature-title").innerText = featuresData[feature].titleFR;
    document.getElementById("feature-text").innerText = featuresData[feature].textFR;
    tooltip.innerText = featuresData[feature].titleFR;
  } else {
    document.getElementById("feature-title").innerText = featuresData[feature].titleEN;
    document.getElementById("feature-text").innerText = featuresData[feature].textEN;
    tooltip.innerText = featuresData[feature].titleEN;
  }

  // Show correct component image
  document.querySelectorAll(".component-img").forEach(img => img.style.display = "none");
  const selectedImg = document.getElementById("img-" + feature);
  if(selectedImg) selectedImg.style.display = "block";
}

// HIDE TOOLTIP WHEN CLICKING OUTSIDE
document.addEventListener("click", (e)=>{
  if(!e.target.classList.contains("point")){
    document.getElementById("tooltip").style.display = "none";
  }
});

// DEFAULT LOAD
window.onload = ()=>{ setLang('en'); };
</script>

</body>
</html>
