<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAVA - AI Coffee Experience</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --main-color: #0A2540;
  --accent-color: #00C2FF;
}

/* REMOVE ALL TOP SPACE */
html, body {
  margin: 0;
  padding: 0;
}

/* GLOBAL */
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  scroll-behavior: smooth;
}

/* LANGUAGE SWITCH */
.lang-switch {
  position: fixed;
  top: 15px;
  right: 20px;
  z-index: 1000;
}
.lang-switch button {
  padding: 8px 12px;
  margin-left: 5px;
  border: none;
  background: white;
  cursor: pointer;
  border-radius: 6px;
}

/* HERO */
.hero-header {
  position: relative;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* VIDEO */
.bg-video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: translate(-50%, -50%);
  filter: brightness(0.65);
}

/* OVERLAY */
.overlay {
  position: relative;
  z-index: 1;
  text-align: center;
}

.logo-animate {
  width: 600px;
  max-width: 80%;
  border-radius: 20px;
}

.headline { font-size: 3rem; margin: 10px 0; }
.subtitle { font-size: 1.4rem; margin-bottom: 25px; }

/* SCROLL INDICATOR INSANE */
.scroll-indicator {
  margin-top: 50px;
  text-align: center;
  cursor: pointer;
}

.scroll-text {
  font-size: 0.75rem;
  letter-spacing: 4px;
  color: white;
  margin-bottom: 10px;
  opacity: 0.7;
}

.scroll-line {
  width: 2px;
  height: 50px;
  margin: 0 auto;
  position: relative;
  background: rgba(255,255,255,0.2);
}

.scroll-line::after {
  content: "";
  position: absolute;
  top: -30px;
  width: 100%;
  height: 30px;
  background: linear-gradient(to bottom, transparent, var(--accent-color), transparent);
  animation: neonFlow 1.6s linear infinite;
}

.scroll-line::before {
  content: "";
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--accent-color);
  border-radius: 50%;
  left: 50%;
  transform: translateX(-50%);
  top: 10px;
  box-shadow: 0 0 20px var(--accent-color);
}

@keyframes neonFlow {
  0% { top: -30px; }
  100% { top: 100%; }
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 50px 20px;
}

/* CARD */
.card {
  background: white;
  padding: 30px;
  margin: 30px 0;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* VIDEO */
.card video {
  width: 100%;
  max-width: 600px;
  display: block;
  margin: auto;
  border-radius: 20px;
}

/* IMAGE */
.image-wrapper {
  position: relative;
  text-align: center;
}

.main-image {
  width: 65%;
  border-radius: 20px;
}

/* SCAN EFFECT */
.scan-line {
  position: absolute;
  top: 0;
  left: 10%;
  width: 80%;
  height: 3px;
  background: var(--accent-color);
  animation: scanMove 3s linear infinite;
}

@keyframes scanMove {
  0% { top: 0; }
  100% { top: 100%; }
}

/* CONNECTION LINES */
.connections {
  position: absolute;
  width: 100%;
  height: 100%;
}

.connections line {
  stroke: var(--accent-color);
  stroke-width: 2;
  stroke-dasharray: 5;
  animation: dashMove 2s linear infinite;
}

@keyframes dashMove {
  to { stroke-dashoffset: -20; }
}

/* POINTS */
.point {
  position: absolute;
  width: 20px;
  height: 20px;
  background: var(--accent-color);
  border-radius: 50%;
  cursor: pointer;
}

.point.active {
  box-shadow: 0 0 20px var(--accent-color);
}

/* GLASS FEATURE BOX */
.feature-box {
  margin-top: 30px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(20px);
}

/* CONTACT */
.contact-box {
  background: var(--main-color);
  color: white;
  text-align: center;
  padding: 40px;
}

.contact-box input,
.contact-box textarea {
  width: 100%;
  max-width: 500px;
  display: block;
  margin: 10px auto;
  padding: 12px;
  border-radius: 8px;
  border: none;
}

.contact-box button {
  padding: 12px 25px;
  background: var(--accent-color);
  border: none;
  color: white;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.contact-box button:hover {
  background: white;
  color: var(--main-color);
}

/* MOBILE */
@media (max-width: 768px) {
  .headline { font-size: 2.2rem; }
  .main-image { width: 90%; }
}
</style>
</head>

<body>

<!-- LANGUAGE SWITCH -->
<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
</div>

<header class="hero-header">
  <video id="hero-bg-video" autoplay muted playsinline class="bg-video" onended="this.pause();">
    <source id="hero-video" src="images/arm AI video.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <img src="images/KAVA LOGO.png" class="logo-animate">
    <h1 id="title"></h1>
    <p id="subtitle"></p>

    <div class="scroll-indicator" onclick="scrollToVideo()">
      <div class="scroll-text">SCROLL</div>
      <div class="scroll-line"></div>
    </div>
  </div>
</header>

<div class="container">

  <!-- VIDEO -->
  <div class="card video-card">
    <h2 id="video-title"></h2>
    <video controls id="action-video">
      <source id="video-source" src="images/Storyboard.mp4" type="video/mp4">
    </video>
  </div>

  <!-- MACHINE -->
  <div class="card">
    <h2 id="experience-title"></h2>

    <div class="image-wrapper">
      <img src="images/KAVA Home page.png" class="main-image">

      <div class="scan-line"></div>

      <svg class="connections">
        <line x1="50%" y1="30%" x2="50%" y2="52%" />
        <line x1="50%" y1="52%" x2="50%" y2="70%" />
        <line x1="50%" y1="52%" x2="30%" y2="55%" />
      </svg>

      <div class="point" style="top:30%; left:50%;" onclick="showFeature('screen')"></div>
      <div class="point" style="top:52%; left:48%;" onclick="showFeature('robot')"></div>
      <div class="point" style="top:70%; left:50%;" onclick="showFeature('touch')"></div>
      <div class="point" style="top:55%; left:30%;" onclick="showFeature('foam')"></div>
    </div>

    <div class="feature-box">
      <h3 id="feature-title"></h3>
      <p id="feature-text"></p>
    </div>
  </div>

  <!-- CONTACT FORM -->
  <div class="card contact-box" id="contact">
    <h2 id="contact-title"></h2>
    <form>
      <input type="text" name="name" placeholder="">
      <input type="email" name="email" placeholder="">
      <textarea name="message" placeholder=""></textarea>
      <button id="contact-btn"></button>
    </form>
  </div>

</div>

<script>
let currentLang = "en";

// FEATURES DATA
const featuresData = {
  screen: {en:{title:"Touch Screen", text:"Intuitive interface."}, fr:{title:"Écran tactile", text:"Interface intuitive."}},
  robot: {en:{title:"Robot Arm", text:"Precision robotic barista."}, fr:{title:"Bras robotisé", text:"Barista précis."}},
  touch: {en:{title:"Touch Control", text:"Customize your drink."}, fr:{title:"Contrôle tactile", text:"Personnalisez votre café."}},
  foam: {en:{title:"Foam Art", text:"Perfect latte art."}, fr:{title:"Art mousse", text:"Art latte parfait."}}
};

function setLang(lang){
  currentLang = lang;

  const heroVideo = document.getElementById("hero-bg-video");
  const actionVideo = document.getElementById("action-video");

  if(lang==="fr"){
    document.getElementById("title").innerText = "Découvrez le futur du café";
    document.getElementById("subtitle").innerText = "Barista robotisé alimenté par l’IA";
    document.getElementById("video-title").innerText = "Voir en action";
    document.getElementById("experience-title").innerText = "Technologie KAVA";
    document.getElementById("contact-title").innerText = "Travaillons ensemble";
    document.getElementById("contact-btn").innerText = "Envoyer";
    document.querySelector('input[name="name"]').placeholder = "Votre nom";
    document.querySelector('input[name="email"]').placeholder = "Votre email";
    document.querySelector('textarea[name="message"]').placeholder = "Votre message";
    document.getElementById("video-source").src = "images/StoryboardFR.mp4";
  } else {
    document.getElementById("title").innerText = "Meet the Future of Coffee";
    document.getElementById("subtitle").innerText = "AI-powered robotic barista";
    document.getElementById("video-title").innerText = "See It in Action";
    document.getElementById("experience-title").innerText = "KAVA Technology";
    document.getElementById("contact-title").innerText = "Let’s Work Together";
    document.getElementById("contact-btn").innerText = "Send";
    document.querySelector('input[name="name"]').placeholder = "Your Name";
    document.querySelector('input[name="email"]').placeholder = "Your Email";
    document.querySelector('textarea[name="message"]').placeholder = "Your Message";
    document.getElementById("video-source").src = "images/Storyboard.mp4";
  }

  // Restart header video
  heroVideo.pause();
  heroVideo.currentTime = 0;
  heroVideo.load();
  heroVideo.play().catch(()=>{});

  // Reload action video
  actionVideo.load();
}

// SHOW FEATURE
function showFeature(feature){
  const data = featuresData[feature][currentLang];
  document.getElementById("feature-title").innerText = data.title;
  document.getElementById("feature-text").innerText = data.text;

  document.querySelectorAll(".point").forEach(p=>p.classList.remove("active"));
  const map={screen:0, robot:1, touch:2, foam:3};
  document.querySelectorAll(".point")[map[feature]].classList.add("active");
}

// AUTO DEMO
const features = ["screen","robot","touch","foam"];
let i=0;
setInterval(()=>{
  showFeature(features[i]);
  i=(i+1)%features.length;
},4000);

function scrollToVideo(){
  document.querySelector(".video-card").scrollIntoView({behavior:"smooth"});
}

// DEFAULT
window.onload = ()=> setLang("en");
</script>

</body>
</html>
