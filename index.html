<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAVA - AI Coffee Experience</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root {
  --main-color: #0A2540;
  --accent-color: #00C2FF;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}

/* LANGUAGE SWITCH */
.lang-switch {
  position: fixed;
  top: 15px;
  right: 20px;
  z-index: 1000;
}

.lang-switch button {
  padding: 8px 12px;
  margin-left: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  background: white;
  font-weight: bold;
}

/* HERO HEADER */
.hero-header {
  position: relative;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* VIDEO BACKGROUND */
.bg-video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 110%;
  height: 110%;
  object-fit: cover;
  transform: translate(-50%, -50%) scale(1);
  z-index: 0;
  filter: brightness(0.7);
  animation: slowZoom 8s ease-in-out infinite;
}

@keyframes slowZoom {
  0%   { transform: translate(-50%, -50%) scale(1); }
  50%  { transform: translate(-50%, -50%) scale(1.08); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

/* OVERLAY */
.hero-header .overlay {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 50px 20px;
  border-radius: 20px;
  background: linear-gradient(
    rgba(10, 37, 64, 0.7),
    rgba(10, 37, 64, 0.4)
  );
}

/* LOGO */
.logo-animate {
  width: 260px;
  margin-bottom: 25px;
}

/* TYPING EFFECT */
.headline {
  font-size: 3rem;
  margin: 20px 0;
  border-right: 3px solid white;
  white-space: nowrap;
  overflow: hidden;
}

/* SUBTITLE */
.subline {
  font-size: 1.3rem;
  margin-bottom: 30px;
}

/* CTA */
.cta-btn {
  display: inline-block;
  padding: 14px 30px;
  background: white;
  color: var(--main-color);
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  50% { transform: scale(1.05); }
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 50px 20px;
}

.card {
  background: white;
  padding: 25px;
  margin: 25px 0;
  border-radius: 15px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
}

.grid img {
  width: 80%;
  max-width: 220px;
  margin: auto;
  display: block;
  border-radius: 12px;
}

/* VIDEO SECTION */
.card video {
  width: 90%;
  max-width: 800px;
  display: block;
  margin: auto;
}

/* CONTACT */
.contact-box {
  text-align: center;
  background: var(--main-color);
  color: white;
  padding: 40px;
  border-radius: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button.submit-btn {
  background: var(--accent-color);
  color: white;
  border: none;
  padding: 12px 25px;
  border-radius: 25px;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111;
  color: white;
}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
</div>

<header class="hero-header">

  <video autoplay muted loop playsinline class="bg-video">
    <source src="images/arm AI video.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <img src="images/KAVA LOGO.png" class="logo-animate">

    <h1 id="title" class="headline"></h1>
    <p id="subtitle" class="subline">AI-powered robotic barista delivering innovation and experience</p>

    <a href="#contact" class="cta-btn" id="cta">Request Partnership</a>
  </div>

</header>

<div class="container">

  <div class="card">
    <img src="images/KAVA Home page.png" style="width:100%;">
  </div>

  <div class="card">
    <h2 id="video-title">See It in Action</h2>
    <video controls>
      <source src="images/video.mp4">
    </video>
  </div>

  <div class="card">
    <h2 id="experience-title">Experience</h2>
    <div class="grid">
      <div>
        <img src="images/ROBOT HAND.png">
        <p id="txt1">Robotic arm preparing coffee</p>
      </div>
      <div>
        <img src="images/screen.png">
        <p id="txt2">Interactive drink selection</p>
      </div>
      <div>
        <img src="images/paying screen.png">
        <p id="txt3">Fast and seamless payment</p>
      </div>
      <div>
        <img src="images/FOAM.png">
        <p id="txt4">Custom printed coffee foam</p>
      </div>
    </div>
  </div>

  <div class="card contact-box" id="contact">
    <h2 id="contact-title">Let’s Work Together</h2>

    <form action="https://formspree.io/f/xvzwjpad" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message"></textarea>
      <button class="submit-btn">Send</button>
    </form>
  </div>

</div>

<footer>
  <p>© 2026 KAVA AI Coffee Experience</p>
</footer>

<script>
// TYPEWRITER EFFECT
function typeText(text) {
  let i = 0;
  const speed = 50;
  const el = document.getElementById("title");
  el.innerHTML = "";

  function typing() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// LANGUAGE SWITCH
function setLang(lang) {
  if (lang === 'fr') {
    typeText("Découvrez le futur du café");
    document.getElementById("subtitle").innerText = "Barista robotisé alimenté par l’IA";
    document.getElementById("cta").innerText = "Demande de partenariat";
    document.getElementById("video-title").innerText = "Voir en action";
    document.getElementById("experience-title").innerText = "Expérience";
    document.getElementById("txt1").innerText = "Bras robotisé préparant le café";
    document.getElementById("txt2").innerText = "Sélection interactive";
    document.getElementById("txt3").innerText = "Paiement rapide";
    document.getElementById("txt4").innerText = "Mousse personnalisée";
    document.getElementById("contact-title").innerText = "Travaillons ensemble";
  } else {
    typeText("Meet the Future of Coffee");
    document.getElementById("subtitle").innerText = "AI-powered robotic barista delivering innovation and experience";
    document.getElementById("cta").innerText = "Request Partnership";
  }
}

// INITIAL LOAD
window.onload = () => setLang('en');
</script>

</body>
</html>
