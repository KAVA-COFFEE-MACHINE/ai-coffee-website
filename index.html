<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KAVA - AI Coffee Experience</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root {
  --main-color: #0A2540;
  --accent-color: #00C2FF;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}

/* LANGUAGE SWITCH */
.lang-switch {
  position: fixed;
  top: 15px;
  right: 20px;
  z-index: 1000;
}

/* HERO HEADER */
.hero-header {
  position: relative;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* VIDEO BACKGROUND */
.bg-video {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 110%;
  height: 110%;
  object-fit: cover;
  transform: translate(-50%, -50%);
  z-index: 0;
  filter: brightness(0.7);
}

/* OVERLAY */
.hero-header .overlay {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 50px 20px;
  border-radius: 20px;
  background: linear-gradient(rgba(10,37,64,0.7), rgba(10,37,64,0.4));
}

/* BIGGER LOGO + TEXT */
.logo-animate {
  width: 380px;
  max-width: 90%;
  margin-bottom: 30px;
}

.headline {
  font-size: 4rem;
  margin: 20px 0;
  border-right: 3px solid white;
  white-space: nowrap;
  overflow: hidden;
}

.subline {
  font-size: 1.5rem;
  margin-bottom: 30px;
}

/* CTA */
.cta-btn {
  padding: 14px 30px;
  background: white;
  color: var(--main-color);
  border-radius: 30px;
  text-decoration: none;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 50px 20px;
}

.card {
  background: white;
  padding: 25px;
  margin: 25px 0;
  border-radius: 15px;
}

/* VIDEO SECTION */
.card h2 {
  text-align: center;
  font-size: 2.2rem;
}

.card video {
  width: 100%;
  max-width: 900px;
  display: block;
  margin: auto;
  border-radius: 15px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
}

.grid img {
  width: 80%;
  max-width: 220px;
  margin: auto;
  display: block;
}

/* CONTACT */
.contact-box {
  text-align: center;
  background: var(--main-color);
  color: white;
  padding: 40px;
  border-radius: 15px;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111;
  color: white;
}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="setLang('en')">EN</button>
  <button onclick="setLang('fr')">FR</button>
</div>

<header class="hero-header">

  <!-- VIDEO (NO LOOP) -->
  <video autoplay muted playsinline class="bg-video">
    <source src="images/arm AI video.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <img src="images/KAVA LOGO.png" class="logo-animate">
    <h1 id="title" class="headline"></h1>
    <p id="subtitle" class="subline">AI-powered robotic barista delivering innovation and experience</p>
    <a href="#contact" class="cta-btn" id="cta">Request Partnership</a>
  </div>

</header>

<div class="container">

  <!-- SEE IT IN ACTION (NOW FIRST) -->
  <div class="card">
    <h2 id="video-title">See It in Action</h2>
    <video controls>
      <source src="Storyboard.mp4">
    </video>
  </div>

  <!-- IMAGE -->
  <div class="card">
    <img src="images/KAVA Home page.png" style="width:100%;">
  </div>

  <!-- EXPERIENCE -->
  <div class="card">
    <h2 id="experience-title">Experience</h2>
    <div class="grid">
      <div>
        <img src="images/ROBOT HAND.png">
        <p id="txt1">Robotic arm preparing coffee</p>
      </div>
      <div>
        <img src="images/screen.png">
        <p id="txt2">Interactive drink selection</p>
      </div>
      <div>
        <img src="images/paying screen.png">
        <p id="txt3">Fast and seamless payment</p>
      </div>
      <div>
        <img src="images/FOAM.png">
        <p id="txt4">Custom printed coffee foam</p>
      </div>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="card contact-box" id="contact">
    <h2 id="contact-title">Let’s Work Together</h2>
    <form action="https://formspree.io/f/xvzwjpad" method="POST">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message"></textarea>
      <button>Send</button>
    </form>
  </div>

</div>

<footer>
  <p>© 2026 KAVA AI Coffee Experience</p>
</footer>

<script>
// STOP VIDEO AFTER END
const video = document.querySelector(".bg-video");
video.addEventListener("ended", () => video.pause());

// TYPE EFFECT
function typeText(text) {
  let i = 0;
  const el = document.getElementById("title");
  el.innerHTML = "";

  function typing() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 40);
    }
  }
  typing();
}

// LANGUAGE
function setLang(lang) {
  if (lang === 'fr') {
    typeText("Découvrez le futur du café");
    document.getElementById("subtitle").innerText = "Barista robotisé alimenté par l’IA";
  } else {
    typeText("Meet the Future of Coffee");
    document.getElementById("subtitle").innerText = "AI-powered robotic barista delivering innovation and experience";
  }
}

window.onload = () => setLang('en');
</script>

</body>
</html>
